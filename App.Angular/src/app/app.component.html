<p-toast />

@if (showLayout()) {
  <!-- Header Toolbar -->
  <p-toolbar styleClass="app-toolbar">
    <ng-template #start>
      <div class="flex align-items-center gap-2">
        <p-avatar
          icon="pi pi-shopping-cart"
          shape="circle"
          styleClass="app-logo-avatar"
        />
        <span class="app-title">{{ title() }}</span>
      </div>
    </ng-template>

    <ng-template #end>
      <div class="flex align-items-center gap-1">
        <p-button
          [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'"
          [rounded]="true"
          [text]="true"
          (onClick)="toggleDarkMode()"
        />
        <p-button
          icon="pi pi-bell"
          [rounded]="true"
          [text]="true"
          severity="secondary"
        />
        <p-avatar
          icon="pi pi-user"
          shape="circle"
          styleClass="user-avatar"
          (click)="userMenu.toggle($event)"
        />
        <p-menu #userMenu [model]="userMenuItems" [popup]="true" />
      </div>
    </ng-template>
  </p-toolbar>

  <!-- Main Content -->
  <main class="app-content">
    <router-outlet />
  </main>
} @else {
  <!-- Full-screen pages (login, 404, 403) -->
  <router-outlet />
}
